<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>User Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>

        body{
            background:#f4f6f9;
        }

        .login-card{
            margin-top:80px;
            border:none;
            border-radius:15px;
            overflow:hidden;
        }

        .card-header{
            background:#0d6efd;
            color:white;
            text-align:center;
            padding:25px;
        }

        .btn-login{
            background:#0d6efd;
            color:white;
            font-weight:bold;
        }

        .btn-login:hover{
            background:#0b5ed7;
            color:white;
        }

        .otp-note{
            font-size:14px;
            color:#6c757d;
        }

    </style>

</head>

<body>

<div th:replace="~{fragments :: navbar}"></div>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow-lg login-card">

                <div class="card-header">

                    <h2>

                        <i class="bi bi-person-circle me-2"></i>

                        Student Login

                    </h2>

                </div>

                <div class="card-body p-4">

                    <!-- ERROR MESSAGE -->

                    <div th:if="${param.error}"
                         class="alert alert-danger">

                        Invalid username or password.

                    </div>

                    <!-- LOGOUT MESSAGE -->

                    <div th:if="${param.logout}"
                         class="alert alert-success">

                        You have been logged out.

                    </div>

                    <!-- LOGIN FORM -->

                    <form th:action="@{/login}"
                          method="post">

                        <div class="mb-3">

                            <label class="form-label">

                                Email / Username

                            </label>

                            <input type="text"
                                   class="form-control"
                                   id="username"
                                   name="username"
                                   required
                                   autofocus>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Password

                            </label>

                            <input type="password"
                                   class="form-control"
                                   id="password"
                                   name="password"
                                   required>

                        </div>

                        <button type="submit"
                                class="btn btn-login w-100">

                            <i class="bi bi-box-arrow-in-right me-2"></i>

                            Login

                        </button>

                    </form>

                    <!-- OTP INFO -->

                    <div class="text-center mt-3 otp-note">

                        OTP verification will be required
                        after successful login.

                    </div>

                    <!-- REGISTER -->

                    <div class="text-center mt-3">

                        <p>

                            New student?

                            <a th:href="@{/register}">

                                Create an account

                            </a>

                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
