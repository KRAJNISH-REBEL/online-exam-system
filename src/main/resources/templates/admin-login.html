<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
        }

        .login-card{
            margin-top:100px;
            border:none;
            border-radius:15px;
            overflow:hidden;
        }

        .card-header{
            background:#dc3545;
            color:white;
            text-align:center;
            padding:20px;
        }

        .btn-login{
            background:#dc3545;
            color:white;
            font-weight:bold;
        }

        .btn-login:hover{
            background:#bb2d3b;
            color:white;
        }

    </style>

</head>

<body>

<div class="container">

    <div class="row justify-content-center">

        <div class="col-md-5">

            <div class="card shadow-lg login-card">

                <div class="card-header">

                    <h3>Admin Login</h3>

                </div>

                <div class="card-body p-4">

                    <form th:action="@{/login}" method="post">

                        <div class="mb-3">

                            <label class="form-label">
                                Admin Email
                            </label>

                            <input type="text"
                                   name="username"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Password
                            </label>

                            <input type="password"
                                   name="password"
                                   class="form-control"
                                   required>

                        </div>

                        <button type="submit"
                                class="btn btn-login w-100">

                            Login

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
